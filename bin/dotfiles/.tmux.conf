#####################################
#           GENERAL SETTING         #
#####################################
## tmux向けのterminfoを使う
set-option -g default-terminal "tmux-256color"
## 番号基準値を変更 ##
set-option -g base-index 1
set -g escape-time 0
## 使用するシェルを明示 ##
set -g default-shell "${SHELL}"

#####################
#       KEYBIND     #
#####################
## prefixキーをC-qに変更 ##
set -g prefix C-q
## C-bのキーバインドを解除 ##
unbind C-b
## vimのキーバインドでペインを移動する ##
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
## vimのキーバインドでペインをリサイズする ##
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
## | でペインを縦分割する ##
bind | split-window -h -c '#{pane_current_path}'
## - でペインを縦分割する ##
bind - split-window -v -c '#{pane_current_path}'
## コピーモードでvimキーバインドを使う ##
setw -g mode-keys vi
## 'v' で選択を始める ##
bind -T copy-mode-vi v send -X begin-selection
## 'V' で行選択 ##
bind -T copy-mode-vi V send -X select-line
## 'C-v' で矩形選択 ##
bind -T copy-mode-vi C-v send -X rectangle-toggle
## 'y' でヤンク ##
bind -T copy-mode-vi y send -X copy-selection
## 'Y' で行ヤンク ##
bind -T copy-mode-vi Y send -X copy-line
## 'C-p'でペースト ##
bind-key C-p paste-buffer
## 'y' で同期モードのトグル (全ペインに同じ入力を送信) ##
bind y setw synchronize-panes

#########################
#       STATUS BAR      #
#########################
## ステータスバーをトップに配置する ##
set-option -g status-position top
## ステータスバーを2行にする（2行目にUsageを表示） ##
set-option -g status 2
## 左右のステータスバーの長さを決定する  ##
set-option -g status-left-length 50
set-option -g status-right-length 50
## 最左に表示 ##
set-option -g status-left " Hostname:#(hostname)"
## 最右に表示 ##
set-option -g status-right "#[fg=colour232,bg=colour40] %a-%m-%d-%Y %H:%M:%S "
## 2行目のUsageは左詰め + 右側余白まで黒背景 ##
set-option -g status-format[1] "#[align=left,fill=black,fg=colour250,bg=black] Usage: Claude #(test -f \"$HOME/.tmux/plugins/agent-usage-tmux/scripts/agent_usage.sh\" && bash \"$HOME/.tmux/plugins/agent-usage-tmux/scripts/agent_usage.sh\" claude 2>/dev/null | sed -E 's/#\\[[^]]*\\]//g' || printf 'n/a') #[fg=colour250,bg=black]| Codex #(test -f \"$HOME/.tmux/plugins/agent-usage-tmux/scripts/agent_usage.sh\" && bash \"$HOME/.tmux/plugins/agent-usage-tmux/scripts/agent_usage.sh\" codex 2>/dev/null | sed -E 's/#\\[[^]]*\\]//g' || printf 'n/a') "
## 以前のpane border表示を無効化 ##
set-option -g pane-border-status off

## ステータスバーの色を設定する ##
set-option -g status-bg "colour40" ##
## status line の文字色を指定する。
set-option -g status-fg "colour232" ##
# カレントウィンドウの window-status のフォーマットを指定する ##
set-window-option -g window-status-current-format "#[fg=colour232,bg=colour40,bold] #I:#W #[default]"
## ステータスバーを1秒毎に描画し直す ##
set-option -g status-interval 1
## センタライズ（主にウィンドウ番号など） ##
set-option -g status-justify centre

#####################################
#           OTHER SETTINGS          #
#####################################
## マウス操作を有効にする ##
set-option -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# SSH-Key-Agent
set-environment -g SSH_AUTH_SOCK "$HOME/.ssh/ssh_auth_sock"

# TPM
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'artischocki/agent-usage-tmux'
set -g @plugin 'j-labbe/tmux-copilot-usage'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @copilot_usage_auto_append 'off'
set -g @agent_usage_show_icons 'off'

# tmux-continuumの設定（自動リストアを有効化）
set -g @continuum-restore 'on'

# TPMの初期化
run-shell '~/.tmux/plugins/tpm/tpm'
